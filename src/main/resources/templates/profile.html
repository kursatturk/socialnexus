<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::main})}">
<main th:fragment="main" class="min-w-0 max-w-3xl space-y-6">
    <header class="border-b border-neutral-800 pb-6">
        <p class="text-xs font-semibold uppercase tracking-widest text-zinc-500">Profile</p>
        <h1 class="text-2xl font-bold text-white" th:text="${activeProfile.name}">Name</h1>
        <p class="mt-1 text-sm text-zinc-500" th:text="'@' + ${activeUser}">@user</p>
    </header>
    <section class="rounded-xl border border-neutral-800 bg-neutral-900 p-6">
        <div class="flex flex-col gap-6 sm:flex-row sm:items-start">
            <div th:with="init=${#strings.toUpperCase(#strings.substring(activeProfile.name(),0,1))}"
                 th:replace="~{fragments/avatar :: circle(${init}, 'lg', ${activeProfile.profilePictureUrl()})}"></div>
            <div class="flex-1 space-y-4">
                <div>
                    <h2 class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Bio</h2>
                    <p class="mt-2 text-sm text-zinc-300" th:text="${activeProfile.bio()} ?: 'No bio yet.'">Bio</p>
                </div>
                <div>
                    <h2 class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Email</h2>
                    <p class="mt-1 text-sm text-zinc-300" th:text="${activeProfile.email()}">email</p>
                </div>
                <div>
                    <h2 class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Skills</h2>
                    <div class="mt-2 flex flex-wrap gap-2">
                        <span th:each="skill : ${activeProfile.skills()}"
                              class="rounded-md border border-neutral-800 bg-black px-3 py-1 text-xs text-zinc-300"
                              th:text="${skill}">Skill</span>
                        <span th:if="${#lists.isEmpty(activeProfile.skills())}" class="text-sm text-zinc-500">None</span>
                    </div>
                </div>
                <div class="flex gap-4 pt-2">
                    <div class="rounded-lg border border-neutral-800 bg-black px-4 py-3">
                        <p class="text-2xl font-bold text-white" th:text="${connectionCount}">0</p>
                        <p class="text-xs text-zinc-500">Connections</p>
                    </div>
                    <div class="rounded-lg border border-neutral-800 bg-black px-4 py-3">
                        <p class="text-2xl font-bold text-white" th:text="${posts.size()}">0</p>
                        <p class="text-xs text-zinc-500">Feed posts</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section>
        <h2 class="mb-4 text-lg font-semibold text-white">Direct connections</h2>
        <div th:if="${#lists.isEmpty(connectedProfiles)}" class="rounded-xl border border-dashed border-neutral-800 bg-zinc-950 p-8 text-center text-sm text-zinc-500">
            No connections yet. <a th:href="@{/network}" class="text-white hover:underline">Browse network</a>
        </div>
        <ul class="space-y-3" th:unless="${#lists.isEmpty(connectedProfiles)}">
            <li th:each="conn : ${connectedProfiles}"
                class="flex items-center gap-4 rounded-xl border border-neutral-800 bg-neutral-900 px-4 py-3">
                <div th:with="init=${#strings.toUpperCase(#strings.substring(conn.name(),0,1))}"
                     th:replace="~{fragments/avatar :: circle(${init}, 'sm', ${conn.profilePictureUrl()})}"></div>
                <div>
                    <p class="font-medium text-white" th:text="${conn.name()}">Name</p>
                    <p class="text-xs text-zinc-500" th:text="'@' + ${conn.username()}">@user</p>
                </div>
                <span class="ml-auto rounded-full border border-neutral-700 px-2.5 py-1 text-xs text-zinc-400">Degree 1</span>
            </li>
        </ul>
    </section>
</main>
</html>
