<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout/base :: layout(~{::main})}">
<main th:fragment="main" class="min-w-0 flex-1 space-y-6">
    <header class="border-b border-neutral-800 pb-6">
        <p class="text-xs font-semibold uppercase tracking-widest text-zinc-500">Graph</p>
        <h1 class="text-2xl font-bold text-white">Professional Network</h1>
        <p class="mt-1 text-sm text-zinc-500">All profiles — O(1) map lookup per card</p>
    </header>
    <div class="grid gap-4 sm:grid-cols-2">
        <article th:each="card : ${networkCards}"
                 class="flex flex-col rounded-xl border border-neutral-800 bg-neutral-900 p-5 transition hover:border-neutral-600">
            <div class="flex items-start gap-4">
                <th:block th:replace="~{fragments/user-link :: avatar(${card.username()}, ${card.initials()}, ${card.profilePictureUrl()}, 'lg')}"></th:block>
                <div class="min-w-0 flex-1">
                    <div class="flex items-start justify-between gap-2">
                        <div>
                            <th:block th:replace="~{fragments/user-link :: name(${card.name()}, ${card.username()})}"></th:block>
                        </div>
                        <span th:if="${card.self()}" class="shrink-0 rounded-md border border-neutral-700 bg-black px-2 py-0.5 text-xs text-zinc-400">You</span>
                    </div>
                    <p class="mt-3 text-sm leading-relaxed text-zinc-400" th:text="${card.bio()}">Bio</p>
                </div>
            </div>
            <div class="mt-4 flex flex-wrap gap-2" th:if="${!#lists.isEmpty(card.skills())}">
                <span th:each="skill : ${card.skills()}"
                      class="rounded-md border border-neutral-800 bg-black px-2.5 py-1 text-xs text-zinc-400"
                      th:text="${skill}">Skill</span>
            </div>
            <div class="mt-5 border-t border-neutral-800 pt-4">
                <div th:replace="~{fragments/network-actions :: connectionAction}"></div>
            </div>
        </article>
    </div>
</main>
</html>
