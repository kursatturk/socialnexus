<!DOCTYPE html>
<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Sign in · SocialNexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="flex min-h-screen items-center justify-center bg-black px-4 font-sans antialiased">
    <div class="w-full max-w-md">
        <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-lg border border-neutral-800 bg-neutral-900 text-lg font-bold text-white">SN</div>
            <h1 class="text-2xl font-bold text-white">Sign in to SocialNexus</h1>
            <p class="mt-2 text-sm text-zinc-500">Your session is isolated per browser.</p>
        </div>

        <form th:action="@{/login}" method="post"
              class="rounded-xl border border-neutral-800 bg-neutral-900 p-6">
            <div th:if="${error}" class="mb-4 rounded-lg border border-neutral-700 bg-zinc-950 px-3 py-2 text-sm text-red-400" th:text="${error}">Error</div>
            <div class="space-y-4">
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Username</label>
                    <input name="username" type="text" required autocomplete="username" th:value="${username}"
                           class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2.5 text-sm text-white focus:border-neutral-500 focus:outline-none"/>
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Password</label>
                    <input name="password" type="password" required autocomplete="current-password"
                           class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2.5 text-sm text-white focus:border-neutral-500 focus:outline-none"/>
                </div>
            </div>
            <button type="submit"
                    class="mt-6 w-full rounded-lg border border-neutral-600 bg-white py-2.5 text-sm font-semibold text-black hover:bg-zinc-200">
                Sign in
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-zinc-500">
            No account? <a th:href="@{/register}" class="text-white hover:underline">Register</a>
        </p>
        <p class="mt-4 text-center text-xs text-zinc-600">Demo: alice / password</p>
    </div>
</body>
</html>
