<div xmlns:th="http://www.thymeleaf.org" th:fragment="results" id="search-results" class="mt-6 space-y-4">
    <p th:if="${#strings.isEmpty(query)}" class="text-sm text-zinc-500">Type a name or username to search the in-memory directory.</p>
    <p th:if="${!#strings.isEmpty(query) and #lists.isEmpty(results)}"
       class="rounded-xl border border-neutral-800 bg-neutral-900 px-4 py-8 text-center text-sm text-zinc-500">
        No matches for "<span class="text-white" th:text="${query}">q</span>".
    </p>

    <article th:each="card : ${results}"
             class="rounded-xl border border-neutral-800 bg-neutral-900 p-5 transition hover:border-neutral-600">
        <div class="flex items-start gap-4">
            <th:block th:replace="~{fragments/user-link :: avatar(${card.username()}, ${card.initials()}, ${card.profilePictureUrl()}, 'lg')}"></th:block>
            <div class="min-w-0 flex-1">
                <h3 class="text-lg font-semibold text-white">
                    <a th:href="@{/user/{u}(u=${card.username()})}" class="hover:text-zinc-200" th:text="${card.name()}">Name</a>
                    <span th:if="${card.self()}" class="ml-2 text-xs font-normal text-zinc-500">(you)</span>
                </h3>
                <a th:href="@{/user/{u}(u=${card.username()})}" class="text-sm text-zinc-500 hover:text-zinc-400" th:text="'@' + ${card.username()}">@user</a>
                <p class="mt-2 text-sm text-zinc-400" th:text="${card.bio()}">Bio</p>
                <div class="mt-3 flex flex-wrap gap-2" th:if="${!#lists.isEmpty(card.skills())}">
                    <span th:each="skill : ${card.skills()}"
                          class="rounded-md border border-neutral-800 bg-black px-2 py-0.5 text-xs text-zinc-400"
                          th:text="${skill}">skill</span>
                </div>
                <div class="mt-4" th:unless="${card.self()}">
                    <div th:replace="~{fragments/connect-control :: slot(card=${card}, refresh='search', query=${query})}"></div>
                </div>
            </div>
        </div>
    </article>
</div>
