<aside th:fragment="panel" xmlns:th="http://www.thymeleaf.org"
       id="suggestions-panel"
       class="hidden w-80 shrink-0 xl:block">
    <div id="suggestions-inner" th:replace="~{fragments/suggestions :: panel-inner}"></div>
</aside>

<div th:fragment="panel-inner" xmlns:th="http://www.thymeleaf.org"
     class="sticky top-6 space-y-4">
    <div class="rounded-xl border border-neutral-800 bg-neutral-900 p-5">
        <h2 class="text-sm font-semibold text-white">Who to connect with</h2>
        <p class="mt-1 text-xs text-zinc-500">Not yet in your graph (degree 0).</p>
    </div>

    <div class="space-y-3" th:if="${#lists.isEmpty(suggestions)}">
        <div class="rounded-xl border border-dashed border-neutral-800 bg-zinc-950 p-6 text-center">
            <p class="text-sm text-zinc-500">You're connected to everyone available.</p>
        </div>
    </div>

    <div class="space-y-3" th:unless="${#lists.isEmpty(suggestions)}">
        <article th:each="s : ${suggestions}"
                 th:id="'suggestion-' + ${s.username()}"
                 class="rounded-xl border border-neutral-800 bg-neutral-900 p-4 transition hover:border-neutral-600">
            <div class="flex items-start gap-3">
                <th:block th:replace="~{fragments/user-link :: avatar(${s.username()}, ${s.initials()}, ${s.profilePictureUrl()}, 'sm')}"></th:block>
                <div class="min-w-0 flex-1">
                    <th:block th:replace="~{fragments/user-link :: name(${s.name()}, ${s.username()})}"></th:block>
                    <p class="mt-2 line-clamp-2 text-xs text-zinc-400" th:text="${s.bio()}">Bio</p>
                </div>
            </div>
            <div class="mt-3">
                <div th:replace="~{fragments/connect-control :: slot(card=${s}, refresh='sidebar', query=null)}"></div>
            </div>
        </article>
    </div>
</div>
