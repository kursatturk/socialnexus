<article xmlns:th="http://www.thymeleaf.org" th:fragment="card"
         th:class="${post.imageUrl() != null} ? 'overflow-hidden rounded-xl border border-neutral-800 bg-neutral-900 transition hover:border-neutral-600' : 'rounded-xl border border-neutral-800 bg-neutral-900 p-5 transition hover:border-neutral-600'">
    <th:block th:if="${post.imageUrl() != null}">
        <div class="relative aspect-[16/10] w-full overflow-hidden bg-zinc-950">
            <img th:src="${post.imageUrl()}" th:alt="${post.content()}"
                 class="h-full w-full object-cover"
                 loading="lazy"
                 onerror="this.parentElement.classList.add('hidden')"/>
        </div>
        <div class="space-y-3 p-5">
            <div class="flex gap-3">
                <th:block th:with="author=${authorProfiles != null ? authorProfiles.get(post.author()) : null},
                                   init=${author != null ? #strings.toUpperCase(#strings.substring(author.name(),0,1)) : #strings.toUpperCase(#strings.substring(post.author(),0,1))},
                                   pic=${author != null ? author.profilePictureUrl() : null}">
                    <th:block th:replace="~{fragments/user-link :: avatar(${post.author()}, ${init}, ${pic}, 'sm')}"></th:block>
                </th:block>
                <div class="min-w-0 flex-1">
                    <th:block th:replace="~{fragments/user-link :: name(${authorNames.get(post.author())}, ${post.author()})}"></th:block>
                    <time class="mt-1 block text-xs text-zinc-500"
                          th:attr="datetime=${post.timestamp()}"
                          th:text="${#temporals.format(post.timestamp(), 'MMM d, yyyy · HH:mm')}">Now</time>
                </div>
            </div>
            <p class="whitespace-pre-wrap text-sm leading-relaxed text-zinc-200" th:text="${post.content()}">Content</p>
        </div>
    </th:block>

    <th:block th:unless="${post.imageUrl() != null}">
        <div class="flex gap-4 p-5">
            <th:block th:with="author=${authorProfiles != null ? authorProfiles.get(post.author()) : null},
                               init=${author != null ? #strings.toUpperCase(#strings.substring(author.name(),0,1)) : #strings.toUpperCase(#strings.substring(post.author(),0,1))},
                               pic=${author != null ? author.profilePictureUrl() : null}">
                <th:block th:replace="~{fragments/user-link :: avatar(${post.author()}, ${init}, ${pic}, 'md')}"></th:block>
            </th:block>
            <div class="min-w-0 flex-1">
                <div class="flex flex-wrap items-center gap-2">
                    <th:block th:replace="~{fragments/user-link :: name(${authorNames.get(post.author())}, ${post.author()})}"></th:block>
                    <span class="text-neutral-700">·</span>
                    <time class="text-xs text-zinc-500"
                          th:attr="datetime=${post.timestamp()}"
                          th:text="${#temporals.format(post.timestamp(), 'MMM d, yyyy · HH:mm')}">Now</time>
                </div>
                <p class="mt-3 whitespace-pre-wrap text-sm leading-relaxed text-zinc-300" th:text="${post.content()}">Content</p>
            </div>
        </div>
    </th:block>
</article>
