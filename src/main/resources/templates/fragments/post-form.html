<section xmlns:th="http://www.thymeleaf.org" th:fragment="composer" class="mb-6">
    <div class="rounded-xl border border-neutral-800 bg-neutral-900 p-5">
        <div class="mb-4 flex items-center gap-3">
            <th:block th:with="init=${#strings.isEmpty(activeProfile.name()) ? #strings.toUpperCase(#strings.substring(activeUser,0,1)) : #strings.toUpperCase(#strings.substring(activeProfile.name(),0,1))}">
                <div th:replace="~{fragments/avatar :: circle(${init}, 'md', ${activeProfile.profilePictureUrl()})}"></div>
            </th:block>
            <div>
                <p class="text-sm font-semibold text-white" th:text="${activeProfile.name()}">You</p>
                <p class="text-xs text-zinc-500">Share with your network</p>
            </div>
        </div>
        <form id="post-form"
              hx-post="/posts/create"
              hx-target="#feed-timeline"
              hx-swap="afterbegin"
              hx-indicator="#post-spinner"
              hx-on="htmx:afterRequest: if(event.detail.successful) { this.reset(); var e = document.getElementById('feed-empty'); if(e) e.remove(); }">
            <textarea name="content" rows="3" required
                      placeholder="What's happening in your professional world?"
                      class="w-full resize-none rounded-lg border border-neutral-800 bg-black px-4 py-3 text-sm text-white placeholder-zinc-600 focus:border-neutral-500 focus:outline-none focus:ring-1 focus:ring-neutral-500"></textarea>
            <input type="url" name="imageUrl"
                   placeholder="Image URL (optional)"
                   class="mt-3 w-full rounded-lg border border-neutral-800 bg-black px-4 py-2.5 text-sm text-white placeholder-zinc-600 focus:border-neutral-500 focus:outline-none focus:ring-1 focus:ring-neutral-500"/>
            <div class="mt-4 flex items-center justify-between">
                <p class="text-xs text-zinc-500">Posted to your feed and neighbors' LIFO stacks.</p>
                <button type="submit"
                        class="inline-flex items-center gap-2 rounded-lg border border-neutral-600 bg-white px-5 py-2.5 text-sm font-semibold text-black transition hover:bg-zinc-200">
                    <span id="post-spinner" class="htmx-indicator inline-block h-4 w-4 animate-spin rounded-full border-2 border-black/20 border-t-black"></span>
                    Post
                </button>
            </div>
        </form>
        <div id="post-error-slot" class="mt-3"></div>
    </div>
</section>
