<div xmlns:th="http://www.thymeleaf.org" th:fragment="slot(card, refresh, query)"
     th:id="'connect-slot-' + ${card.username()}">
    <span th:if="${card.self()}"
          class="inline-flex items-center rounded-full border border-neutral-700 bg-black px-3 py-1.5 text-xs font-medium text-zinc-500">
        This is you
    </span>
    <th:block th:if="${card.connected() and !card.self()}">
        <span class="inline-flex items-center gap-1.5 rounded-full border border-neutral-600 bg-neutral-800 px-3 py-1.5 text-xs font-semibold text-zinc-200">
            <svg class="h-3.5 w-3.5 text-emerald-400" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>
            Connected (Degree 1)
        </span>
        <button type="button"
                th:attr="hx-delete=|/network/disconnect?target=${card.username()}${refresh != null and !#strings.isEmpty(refresh) ? '&refresh=' + refresh : ''}${query != null and !#strings.isEmpty(query) ? '&q=' + query : ''}|,
                         hx-target=${refresh == 'sidebar'} ? |#suggestion-${card.username()}| : (${refresh == 'search'} ? '#search-results' : (${refresh == 'profile'} ? '#profile-connection-slot' : |#connect-slot-${card.username()}|)),
                         hx-swap=${refresh == 'sidebar'} ? 'delete' : (${refresh == 'search' or refresh == 'profile'} ? 'innerHTML' : 'outerHTML')"
                class="ml-2 inline-flex items-center rounded-lg border border-neutral-700 bg-black px-3 py-1.5 text-xs font-medium text-zinc-300 transition hover:border-red-900/60 hover:bg-red-950/40 hover:text-red-300">
            Disconnect
        </button>
    </th:block>
    <button th:if="${!card.connected() and !card.self()}" type="button"
            th:attr="hx-post=|/network/connect?target=${card.username()}${refresh != null and !#strings.isEmpty(refresh) ? '&refresh=' + refresh : ''}${query != null and !#strings.isEmpty(query) ? '&q=' + query : ''}|,
                     hx-target=${refresh == 'sidebar'} ? |#suggestion-${card.username()}| : (${refresh == 'search'} ? '#search-results' : (${refresh == 'profile'} ? '#profile-connection-slot' : |#connect-slot-${card.username()}|)),
                     hx-swap=${refresh == 'sidebar'} ? 'delete' : (${refresh == 'search' or refresh == 'profile'} ? 'innerHTML' : 'outerHTML')"
            class="inline-flex items-center rounded-lg border border-neutral-600 bg-white px-4 py-2 text-xs font-semibold text-black transition hover:bg-zinc-200">
        Connect
    </button>
</div>
