<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="avatar(username, initials, pictureUrl, size)">
    <a th:href="@{/user/{u}(u=${username})}" class="shrink-0 rounded-full ring-1 ring-transparent transition hover:ring-neutral-600">
        <div th:replace="~{fragments/avatar :: circle(${initials}, ${size}, ${pictureUrl})}"></div>
    </a>
</th:block>

<th:block xmlns:th="http://www.thymeleaf.org" th:fragment="name(name, username)">
    <a th:href="@{/user/{u}(u=${username})}" class="group inline-flex flex-wrap items-center gap-2">
        <span class="font-semibold text-white transition group-hover:text-zinc-200" th:text="${name}">Name</span>
        <span class="text-sm text-zinc-500 transition group-hover:text-zinc-400" th:text="'@' + ${username}">@user</span>
    </a>
</th:block>
