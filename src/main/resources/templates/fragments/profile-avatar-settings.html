<div xmlns:th="http://www.thymeleaf.org" th:fragment="settings" class="rounded-lg border border-neutral-800 bg-black/50 p-4">
    <h3 class="text-xs font-semibold uppercase tracking-wider text-zinc-500">Avatar</h3>
    <p class="mt-1 text-xs text-zinc-600">Set your profile picture via image URL.</p>
    <form class="mt-3 flex flex-col gap-3 sm:flex-row sm:items-end"
          hx-post="/user/profile-picture"
          hx-target="#profile-avatar-settings"
          hx-swap="innerHTML">
        <input type="url" name="profilePictureUrl" th:value="${profileUser.profilePictureUrl()}"
               placeholder="https://example.com/avatar.jpg"
               class="min-w-0 flex-1 rounded-lg border border-neutral-800 bg-black px-4 py-2.5 text-sm text-white placeholder-zinc-600 focus:border-neutral-500 focus:outline-none focus:ring-1 focus:ring-neutral-500"/>
        <button type="submit"
                class="shrink-0 rounded-lg border border-neutral-600 bg-white px-4 py-2.5 text-xs font-semibold text-black transition hover:bg-zinc-200">
            Update avatar
        </button>
    </form>
</div>
