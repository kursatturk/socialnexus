<aside th:fragment="sidebar" xmlns:th="http://www.thymeleaf.org"
       class="hidden w-64 shrink-0 lg:block">
    <div class="sticky top-6 space-y-6">
        <div class="flex items-center gap-3 px-2">
            <div class="flex h-10 w-10 items-center justify-center rounded-lg border border-neutral-800 bg-neutral-900 font-bold text-white">
                SN
            </div>
            <div>
                <p class="text-lg font-semibold tracking-tight text-white">SocialNexus</p>
                <p class="text-xs text-zinc-500">Stealth Network</p>
            </div>
        </div>

        <nav class="space-y-1 rounded-xl border border-neutral-800 bg-neutral-900/80 p-2">
            <a th:href="@{/}"
               th:classappend="${activePage == 'feed'} ? 'border border-neutral-700 bg-neutral-800 text-white' : 'text-zinc-400 hover:bg-neutral-800/60 hover:text-white'"
               class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"/></svg>
                Feed
            </a>
            <a th:href="@{/network}"
               th:classappend="${activePage == 'network'} ? 'border border-neutral-700 bg-neutral-800 text-white' : 'text-zinc-400 hover:bg-neutral-800/60 hover:text-white'"
               class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Network
            </a>
            <a th:href="@{/search}"
               th:classappend="${activePage == 'search'} ? 'border border-neutral-700 bg-neutral-800 text-white' : 'text-zinc-400 hover:bg-neutral-800/60 hover:text-white'"
               class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Search
            </a>
            <a th:href="@{/user/{u}(u=${activeUser})}"
               th:classappend="${activePage == 'profile'} ? 'border border-neutral-700 bg-neutral-800 text-white' : 'text-zinc-400 hover:bg-neutral-800/60 hover:text-white'"
               class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium transition">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
                Profile
            </a>
        </nav>

        <div id="sidebar-profile" class="rounded-xl border border-neutral-800 bg-neutral-900 p-3">
            <div th:replace="~{fragments/sidebar-profile :: mini}"></div>
        </div>
    </div>
</aside>
