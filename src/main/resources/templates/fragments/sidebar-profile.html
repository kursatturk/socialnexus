<div xmlns:th="http://www.thymeleaf.org" th:fragment="mini">
    <div class="flex items-center gap-3">
        <th:block th:with="init=${#strings.isEmpty(activeProfile.name()) ? #strings.toUpperCase(#strings.substring(activeUser,0,1)) : #strings.toUpperCase(#strings.substring(activeProfile.name(),0,1))}">
            <div th:replace="~{fragments/avatar :: circle(${init}, 'md', ${activeProfile.profilePictureUrl()})}"></div>
        </th:block>
        <div class="min-w-0 flex-1">
            <a th:href="@{/user/{u}(u=${activeUser})}" class="block truncate text-sm font-semibold text-white hover:text-zinc-200" th:text="${activeProfile.name()}">Name</a>
            <a th:href="@{/user/{u}(u=${activeUser})}" class="block truncate text-xs text-zinc-500 hover:text-zinc-400" th:text="'@' + ${activeUser}">@user</a>
            <p class="mt-1 text-xs text-zinc-400" th:text="${connectionCount} + ' connections'">0</p>
        </div>
    </div>
    <form th:action="@{/logout}" method="post" class="mt-3">
        <button type="submit"
                class="w-full rounded-lg border border-neutral-700 px-3 py-2 text-xs font-medium text-zinc-300 transition hover:border-neutral-500 hover:bg-neutral-800 hover:text-white">
            Sign out
        </button>
    </form>
</div>
