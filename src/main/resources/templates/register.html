<!DOCTYPE html>
<html lang="en" class="dark" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Register · SocialNexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body class="flex min-h-screen items-center justify-center bg-black px-4 py-12 font-sans antialiased">
    <div class="w-full max-w-md">
        <div class="mb-8 text-center">
            <div class="mx-auto mb-4 flex h-12 w-12 items-center justify-center rounded-lg border border-neutral-800 bg-neutral-900 text-lg font-bold text-white">SN</div>
            <h1 class="text-2xl font-bold text-white">Create account</h1>
            <p class="mt-2 text-sm text-zinc-500">Join the in-memory professional graph.</p>
        </div>

        <form th:action="@{/register}" method="post" class="rounded-xl border border-neutral-800 bg-neutral-900 p-6">
            <div th:if="${error}" class="mb-4 rounded-lg border border-neutral-700 bg-zinc-950 px-3 py-2 text-sm text-red-400" th:text="${error}">Error</div>
            <div class="space-y-3">
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Username</label>
                    <input name="username" required th:value="${username}"
                           class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2 text-sm text-white focus:border-neutral-500 focus:outline-none"/>
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Email</label>
                    <input name="email" type="email" required th:value="${email}"
                           class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2 text-sm text-white focus:border-neutral-500 focus:outline-none"/>
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Password</label>
                    <input name="password" type="password" required minlength="4"
                           class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2 text-sm text-white focus:border-neutral-500 focus:outline-none"/>
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Full name</label>
                    <input name="name" required th:value="${name}"
                           class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2 text-sm text-white focus:border-neutral-500 focus:outline-none"/>
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Bio</label>
                    <textarea name="bio" rows="2" th:text="${bio}"
                              class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2 text-sm text-white focus:border-neutral-500 focus:outline-none"></textarea>
                </div>
                <div>
                    <label class="mb-1 block text-xs font-medium text-zinc-500">Skills (comma-separated)</label>
                    <input name="skills" th:value="${skills}" placeholder="Java, Spring, Graphs"
                           class="w-full rounded-lg border border-neutral-800 bg-black px-3 py-2 text-sm text-white focus:border-neutral-500 focus:outline-none"/>
                </div>
            </div>
            <button type="submit"
                    class="mt-6 w-full rounded-lg border border-neutral-600 bg-white py-2.5 text-sm font-semibold text-black hover:bg-zinc-200">
                Register
            </button>
        </form>
        <p class="mt-6 text-center text-sm text-zinc-500">
            Already have an account? <a th:href="@{/login}" class="text-white hover:underline">Sign in</a>
        </p>
    </div>
</body>
</html>
